<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Logic Controller</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #0f0; padding: 20px; border-radius: 8px; box-shadow: 0 0 15px #0f0; }
        input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 250px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0a0; }
        #status { margin-top: 15px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2>BUILD LOGIC BRIDGE</h2>
        <input type="text" id="textInput" placeholder="Enter text for Roblox...">
        <br>
        <button onclick="sendData()">SEND TO VERCEL</button>
        <div id="status">Current Data: <span id="display">Loading...</span></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
